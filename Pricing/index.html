<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard Pricing</title>

  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #07090d;
      --card: #0c0f15;
      --border: #161c27;
      --accent: #00ffcc;
      --accent-glow: rgba(0,255,204,0.25);
      --text: #dde4f0;
      --text-muted: #4e6070;
      --nav-bg: rgba(12,15,21,0.8);
    }

    body.light {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111;
      --text-muted: #555;
      --border: #ddd;
      --nav-bg: rgba(255,255,255,0.9);
    }

    body.accessibility {
      font-size: 1.15rem;
      --text: #ffffff;
      --text-muted: #d0d0d0;
    }

    body.light.accessibility {
      --text: #000000;
      --text-muted: #222;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: all 0.25s ease;
    }

    html, body {
      overflow-x: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Oxanium', sans-serif;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .nav-link {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      border-radius: 5px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .nav-link:hover {
      color: var(--text);
      border: 1px solid var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .nav-link.active {
      color: var(--accent);
      border: 1px solid var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .nav-right {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.3rem 0.6rem;
      font-size: 0.7rem;
      border-radius: 5px;
      cursor: pointer;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    body.accessibility .nav-link {
      font-size: 0.9rem;
    }

    body.accessibility .nav-btn {
      font-size: 0.85rem;
    }

    /* GRID */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: auto;
      padding: 2rem 1rem 4rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 10vw, 4rem);
      margin-bottom: 2rem;
      background: linear-gradient(140deg, #fff 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    body.light h1 {
      background: linear-gradient(140deg, #000 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 25px var(--accent-glow);
      transform: translateY(-3px);
    }

    .title {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .price {
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .features {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .features li {
      list-style: none;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    .btn {
      display: inline-block;
      padding: 0.7rem 1.6rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .btn:hover {
      background: rgba(0,255,204,0.1);
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateY(-2px);
    }

    body.accessibility .btn {
      font-size: 1.05rem;
      padding: 1rem 2rem;
    }

    .note {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-left">
      <a href="../" class="nav-link">Home</a>
      <a href="../Download/" class="nav-link">Download</a>
      <a href="../Pricing/" class="nav-link active">Pricing</a>
      <a href="Purchase/" class="nav-link">Purchase</a>
    </div>

    <div class="nav-right">
      <button class="nav-btn" onclick="toggleLight()">Light</button>
      <button class="nav-btn" onclick="toggleAccess()">A+</button>
    </div>
  </div>

  <div class="container">
    <h1>Pricing</h1>

    <div class="card">
      <div class="title">FocusGuard License Key</div>
      <div class="price">$19.99 (one-time)</div>

      <ul class="features">
        <li>• Full screen time control</li>
        <li>• App blocking</li>
        <li>• Custom schedules</li>
        <li>• Usage tracking + stats</li>
        <li>• Simple and easy to use interface</li>
      </ul>

      <a href="Purchase/" class="btn">Purchase</a>

      <div class="note">
        One-time purchase. No subscription required.
      </div>
    </div>
  </div>

  <script>
    function toggleLight() {
      document.body.classList.toggle("light");
      localStorage.setItem("lightMode", document.body.classList.contains("light"));
    }

    function toggleAccess() {
      document.body.classList.toggle("accessibility");
      localStorage.setItem("accessMode", document.body.classList.contains("accessibility"));
    }

    if (localStorage.getItem("lightMode") === "true") {
      document.body.classList.add("light");
    }

    if (localStorage.getItem("accessMode") === "true") {
      document.body.classList.add("accessibility");
    }
  </script>

</body>
</html>
