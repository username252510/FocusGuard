<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard Downloads</title>

  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #07090d;
      --card: #0c0f15;
      --border: #161c27;
      --accent: #00ffcc;
      --accent-glow: rgba(0,255,204,0.25);
      --text: #dde4f0;
      --text-muted: #4e6070;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Oxanium', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      text-transform: uppercase;
      background: linear-gradient(140deg, #fff 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      transition: 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      transform: translateY(-3px);
    }

    .card-title {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      transition: 0.2s;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .btn:hover {
      background: rgba(0,255,204,0.1);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .coming {
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }

    .icon {
      margin-bottom: 0.6rem;
    }

    svg {
      fill: white;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Downloads</h1>

    <!-- WINDOWS -->
    <div class="card">
      <div class="icon">
        <!-- Windows logo -->
        <svg width="40" height="40" viewBox="0 0 24 24">
          <path d="M3 5l8-1v8H3V5zm9-1l9-1v9h-9V4zM3 13h8v8l-8-1v-7zm9 0h9v9l-9-1v-8z"/>
        </svg>
      </div>

      <div class="card-title">Windows 11</div>
      <div class="sub">Download FocusGuard for Windows</div>

      <a href="../appdownload/FocusGuard.txt" download class="btn">Download</a>
    </div>

    <!-- MAC -->
    <div class="card">
      <div class="icon">
        <!-- Apple logo (simple) -->
        <svg width="40" height="40" viewBox="0 0 24 24">
          <path d="M16 13c0-3 2-4 2-4s-1-2-3-2c-1.5 0-2.5 1-3 1s-1.5-1-3-1c-2 0-4 2-4 5s2 7 4 7c1.5 0 2-1 3-1s1.5 1 3 1c1.5 0 3-2 3-5z"/>
        </svg>
      </div>

      <div class="card-title">macOS</div>
      <div class="coming">Coming Soon</div>
    </div>

    <!-- IOS -->
    <div class="card">
      <div class="card-title">iOS</div>
      <div class="coming">Coming Soon</div>
    </div>

    <!-- ANDROID -->
    <div class="card">
      <div class="card-title">Android</div>
      <div class="coming">Coming Soon</div>
    </div>

  </div>

</body>
</html>
